    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #1a1a1a;
        }
        @keyframes bounce-subtle { 
            0%, 100% { transform: translateY(0); } 
            50% { transform: translateY(-4px); } 
        }
        .bounce-subtle-animation { 
            animation: bounce-subtle 3s infinite ease-in-out; 
        }
        .line-clamp-1 { 
            display: -webkit-box; 
            -webkit-line-clamp: 1; 
            -webkit-box-orient: vertical; 
            overflow: hidden; 
        }
        ::-webkit-scrollbar { 
            width: 6px; 
            height: 6px; 
        }
        ::-webkit-scrollbar-track { 
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb { 
            background: #ccc; 
            border-radius: 10px; 
        }
        ::-webkit-scrollbar-thumb:hover { 
            background: #999; 
        }
        .whitespace-pre-wrap { 
            white-space: pre-wrap; 
        }
        .scrollbar-hide::-webkit-scrollbar { 
            display: none; 
        }
        .scrollbar-hide { 
            -ms-overflow-style: none; 
            scrollbar-width: none; 
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Lucide 아이콘들을 동적으로 로드
        const iconMap = {
            Heart: () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>,
            Gift: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v-1m0 0H8m4 0h4m-4 0v8m0-8l-4 4m8 0l4 4M5 12a7 7 0 1014 0 7 7 0 01-14 0z" /></svg>,

            Send: () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M16.6915026,12.4744748 L3.50612381,13.2599618 C3.19218622,13.2599618 3.03521743,13.4170592 3.03521743,13.5741566 L1.15159189,20.0151496 C0.8376543,20.8006365 0.99,21.89 1.77946707,22.52 C2.41,22.99 3.50612381,23.1 4.13399899,22.8429026 L21.714504,14.0454487 C22.6563168,13.5741566 23.1272231,12.6315722 22.9702544,11.6889879 L4.13399899,1.16151496 C3.34915502,0.9 2.40734225,0.9 1.77946707,1.4429026 C0.994623095,2.07657161 0.837654326,3.1659125 1.15159189,3.95140939 L3.03521743,10.3923933 C3.03521743,10.5494907 3.19218622,10.7065881 3.50612381,10.7065881 L16.6915026,11.4920750 C16.6915026,11.4920750 17.1624089,11.4920750 17.1624089,11.0208126 L17.1624089,12.0633969 C17.1624089,12.5346593 16.6915026,12.4744748 16.6915026,12.4744748 Z"/></svg>,
            ShoppingBag: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 6H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V8a2 2 0 00-2-2h-2m-6-3v6m0 0v6m0-6h6m-6 0H6" /></svg>,
            RefreshCw: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>,
            ChevronRight: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>,
            Plus: () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 5v14m7-7H5" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>,
            Minus: () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M5 12h14" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>,
            Check: () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>,
            ShoppingCart: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" /></svg>,
            AlertCircle: () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>,
            Store: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" /></svg>,
            Info: () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>,
            Share: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8.684 13.342C8.886 12.938 9 12.469 9 12c0-1.657-.895-3.095-2.236-3.88L5.07 6.323a7.972 7.972 0 011.5-.866m9.286 0c.72.398 1.378.89 1.95 1.467l-2.694 2.797A4.956 4.956 0 0015 12c0 .469.114.938.316 1.342m2.82 6.674A7.972 7.972 0 1012 2c3.879 0 7.26 2.014 9.372 5.03" /></svg>,
            Settings: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>,
            RotateCw: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>,
            Smile: () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15c-2.33 0-4.31-1.46-5.11-3.5h2.49c.65 1.36 2.08 2.3 3.62 2.3s2.97-.94 3.62-2.3h2.49c-.8 2.04-2.78 3.5-5.11 3.5zm0-9c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>,
            Sticker: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14 4l-4 4m0 0L4 4m10 0v16m0 0l4-4m-4 4l4 4M4 4l4 4m0 0h12" /></svg>,
            ImageIcon: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
            Zap: () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
            Gamepad2: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>,
            FileText: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>,
        };

        const Icon = ({ name, ...props }) => {
            const Component = iconMap[name];
            return Component ? <Component {...props} /> : null;
        };

        // Firebase 설정
        const firebaseConfig = {
            apiKey: "AIzaSyDw_QzXrY-X1234567890abcdefghijk",
            authDomain: "your-project.firebaseapp.com",
            projectId: "your-project-id",
            storageBucket: "your-project.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abc123def456"
        };

        let db = null;

        // Firebase 초기화 시도
        try {
            if (window.firebase) {
                const app = window.firebase.initializeApp(firebaseConfig);
                db = window.firebase.firestore(app);
            }
        } catch (e) {
            console.log("Firebase 초기화 실패 - 로컬 스토리지 사용");
        }

        // MobileFrame 컴포넌트
        const MobileFrame = ({ title, children, onShare }) => (
            <div className="flex flex-col items-center gap-4 flex-shrink-0">
                <div className="flex items-center justify-between w-full max-w-[375px] px-2">
                    <h2 className="text-white font-bold text-lg bg-gray-800 px-4 py-1 rounded-full">{title}</h2>
                    <button 
                        onClick={onShare}
                        className="flex items-center gap-1.5 bg-indigo-600 hover:bg-indigo-500 text-white text-xs px-3 py-1.5 rounded-full font-bold transition-all shadow-lg active:scale-95"
                    >
                        <Icon name="Share" /> 공유하기
                    </button>
                </div>
                <div className="relative w-[375px] h-[812px] bg-black overflow-hidden shadow-2xl rounded-[3rem] border-[8px] border-gray-800">
                    {children}
                    <div className="absolute bottom-1.5 left-1/2 -translate-x-1/2 w-32 h-1 bg-white/30 rounded-full z-[200]" />
                </div>
            </div>
        );

        // App 메인 컴포넌트
        const App = () => {
            const initialProducts = [
                { id: 1, name: "아주 예쁜 가방", fullName: "[판매 1위] 아주 예쁜 가방 오늘 특가 (강력추천)", option: "컬러: 민트 / 사이즈: FREE", price: 23000, priceLabel: "23,000원", img: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa?q=80&w=1469&auto=format&fit=crop", stats: { available: 50, completed: 45, reserved: 0 } },
                { id: 2, name: "독일 명품 땡처리", fullName: "독일 명품 땡처리 12피스 세트", option: "옵션: 12피스 / 구성품 포함", price: 23000, priceLabel: "23,000원", img: "https://images.unsplash.com/photo-1594223274512-ad4803739b7c?q=80&w=1457&auto=format&fit=crop", stats: { available: 50, completed: 45, reserved: 0 } },
                { id: 3, name: "배송비", fullName: "합배송 상품 (기본 배송비)", option: "기본 배송비 결제", price: 4000, priceLabel: "4,000원", img: "https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?q=80&w=2070&auto=format&fit=crop", stats: { available: 999, completed: 120, reserved: 0 } },
                { id: 4, name: "데일리 면 티셔츠", fullName: "[1+1] 데일리 순면 기본 티셔츠 화이트/블랙", option: "사이즈: FREE / 수량: 1+1", price: 15900, priceLabel: "15,900원", img: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?q=80&w=1480&auto=format&fit=crop", stats: { available: 100, completed: 30, reserved: 0 } },
                { id: 5, name: "디자이너 스니커즈", fullName: "한정판 디자이너 런닝화 2026 Edition", option: "사이즈: 240mm / 컬러: 화이트", price: 89000, priceLabel: "89,000원", img: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=1470&auto=format&fit=crop", stats: { available: 20, completed: 15, reserved: 0 } }
            ];

            const [inventory, setInventory] = useState(initialProducts);
            const [upProductId, setUpProductId] = useState(null);
            const [storeStatus, setStoreStatus] = useState(new Array(5).fill(false));
            const [productStatuses, setProductStatuses] = useState(new Array(5).fill('판매예정'));
            const [comments, setComments] = useState([
                { id: 'initial-1', text: '반갑습니다! 라이브 방송 시작합니다.', type: 'system' }
            ]);
            const [isStoreOpen, setIsStoreOpen] = useState(false);
            const [storeActiveTab, setStoreActiveTab] = useState('판매상품');
            const [isOptionOpen, setIsOptionOpen] = useState(false);
            const [selectingProduct, setSelectingProduct] = useState(null);
            const [selectQuantity, setSelectQuantity] = useState(1);
            const [orderSource, setOrderSource] = useState(null);
            const [orderedItems, setOrderedItems] = useState([]);
            const [showToast, setShowToast] = useState(false);
            const [alertMsg, setAlertMsg] = useState(null);
            const [shareSuccess, setShareSuccess] = useState(false);
            const [isSellerListOpen, setIsSellerListOpen] = useState(true);
            const [visibleBanners, setVisibleBanners] = useState(new Array(5).fill(false));

            const manualItems = [
                { label: "화면 설명", text: "한정판매 방송자/고객 화면 입니다." },
                { label: "한정판매 상품 up", text: "up버튼을 통해 선착순 판매상품을 노출하세요." },
                { label: "스토어 상품리스트 노출하기", text: "스토어 on 버튼 클릭시 상품리스트에 상품이 노출됩니다." },
                { label: "판매가능 재고 확인", text: "주문버튼을 통해 점유된 재고는 점유수량에 카운트됩니다." },
                { label: "주문완료", text: "주문완료시 채팅창에 주문성공 메시지가 노출됩니다." },
            ];

            const handleShare = () => {
                const url = window.location.href;
                navigator.clipboard.writeText(url);
                setShareSuccess(true);
                setTimeout(() => setShareSuccess(false), 3000);
            };

            const startOptionSelection = (product, source) => {
                setSelectingProduct(product);
                setSelectQuantity(1);
                setOrderSource(source);
                setIsOptionOpen(true);
            };

            const confirmOrder = async () => {
                if (!selectingProduct) return;
                
                setOrderedItems(prev => {
                    const exists = prev.find(item => item.id === selectingProduct.id);
                    if (exists) return prev.map(item => item.id === selectingProduct.id ? { ...item, quantity: item.quantity + selectQuantity } : item);
                    return [...prev, { ...selectingProduct, quantity: selectQuantity }];
                });

                const newInventory = inventory.map(p => 
                    p.id === selectingProduct.id 
                        ? { ...p, stats: { ...p.stats, available: Math.max(0, p.stats.available - selectQuantity), reserved: p.stats.reserved + selectQuantity } } 
                        : p
                );

                const newComment = {
                    id: Date.now().toString(),
                    user: '회원님',
                    text: '한정 특가 판매 주문 성공!',
                    type: 'order-success'
                };
                const updatedComments = [...comments, newComment].slice(-20);

                setInventory(newInventory);
                setComments(updatedComments);
                setIsOptionOpen(false);
                if (orderSource === 'limited') { setIsStoreOpen(false); }
                setShowToast(true);
                setTimeout(() => setShowToast(false), 5000);
            };

            const updateQuantity = (id, delta) => {
                const item = orderedItems.find(i => i.id === id);
                if (!item) return;
                const newQuantity = Math.max(1, item.quantity + delta);
                const quantityDiff = newQuantity - item.quantity;
                setOrderedItems(prev => prev.map(i => i.id === id ? { ...i, quantity: newQuantity } : i));
                const newInventory = inventory.map(p => 
                    p.id === id 
                        ? { ...p, stats: { ...p.stats, available: Math.max(0, p.stats.available - quantityDiff), reserved: p.stats.reserved + quantityDiff } } 
                        : p
                );
                setInventory(newInventory);
            };

            const removeOrderItem = (id) => {
                const removedItem = orderedItems.find(item => item.id === id);
                if (!removedItem) return;
                setOrderedItems(prev => prev.filter(item => item.id !== id));
                const newInventory = inventory.map(p => 
                    p.id === id 
                        ? { ...p, stats: { ...p.stats, available: p.stats.available + removedItem.quantity, reserved: Math.max(0, p.stats.reserved - removedItem.quantity) } } 
                        : p
                );
                setInventory(newInventory);
            };

            const toggleStoreStatus = (idx, productId) => {
                if (upProductId === productId) {
                    setAlertMsg("한정판매 UP 선택된 상품은 스토어 ON이 불가합니다.");
                    return;
                }
                const nextStatus = [...storeStatus];
                nextStatus[idx] = !nextStatus[idx];
                setStoreStatus(nextStatus);
            };

            const handleStatusChange = (idx, newStatus) => {
                const nextStatuses = [...productStatuses];
                nextStatuses[idx] = newStatus;
                setProductStatuses(nextStatuses);
            };

            const handleUpToggle = (id) => {
                const nextUp = upProductId === id ? null : id;
                setUpProductId(nextUp);
            };

            const openCart = () => {
                setStoreActiveTab('라이브 주문서');
                setIsStoreOpen(true);
                setShowToast(false);
                setIsOptionOpen(false);
            };

            const openStoreProducts = () => {
                setStoreActiveTab('판매상품');
                setIsStoreOpen(true);
            };

            const toggleBanner = (index) => {
                const nextBanners = [...visibleBanners];
                nextBanners[index] = !nextBanners[index];
                setVisibleBanners(nextBanners);
            };

            const currentUpProduct = upProductId !== null ? inventory.find(p => p.id === upProductId) : null;
            const currentStatus = upProductId !== null ? productStatuses[inventory.findIndex(p => p.id === upProductId)] : null;
            const onSaleProducts = inventory.filter((_, idx) => storeStatus[idx]);
            const onSaleCount = onSaleProducts.length;
            const storeThumbnail = onSaleCount > 0 ? onSaleProducts[0].img : null;
            const totalOrderAmount = orderedItems.reduce((acc, item) => acc + (item.price * item.quantity), 0);

                                        <div className="pt-4 border-t border-gray-100 flex-shrink-0">
                                            <div className="flex justify-end items-center gap-3 mb-4"><span className="text-[13px] text-gray-500 font-medium">총 상품 금액</span><span className="text-[20px] font-black">{(selectingProduct.price * selectQuantity).toLocaleString()}원</span></div>
                                            <button onClick={confirmOrder} className="w-full bg-[#D14F5F] text-white font-bold py-4 rounded-xl text-[16px] shadow-md active:scale-95 transition-all">주문하기</button>
                                        </div>
                                    </div>
                                </>
                            )}
                        </div>
                    </MobileFrame>

                    {/* 셀러 뷰 */}
                    <MobileFrame title="셀러 뷰" onShare={handleShare}>
                        {isSellerListOpen ? (
                            <AdminProductList />
                        ) : (
                            <SellerBroadcastUI />
                        )}
                    </MobileFrame>

                    {/* 메뉴얼 */}
                    <div className="flex flex-col items-center gap-4 flex-shrink-0 self-start sticky top-8 z-[100]">
                        <h2 className="text-white font-bold text-lg bg-indigo-600 px-6 py-1 rounded-full shadow-lg">메뉴얼</h2>
                        <div className="flex flex-col gap-4 py-4 p-2 bg-white/5 rounded-3xl border border-white/10 shadow-2xl backdrop-blur-md">
                            {manualItems.map((item, idx) => (
                                <div key={idx} className="relative group flex justify-end">
                                    {visibleBanners[idx] && (
                                        <div className="fixed bg-indigo-700 text-white px-8 py-6 rounded-3xl shadow-[0_40px_100px_rgba(0,0,0,0.7)] animate-in slide-in-from-right-10 fade-in duration-300 z-[2000] flex flex-col gap-3 border border-indigo-400/50 backdrop-blur-xl" style={{ top: '20%', right: '420px', width: '500px', maxWidth: '80vw' }}>
                                            <div className="flex flex-col gap-3 flex-grow">
                                                <h4 className="text-lg font-medium tracking-tight border-b border-white/20 pb-2">{item.label}</h4>
                                                <span className="text-[17px] font-normal whitespace-pre-wrap leading-relaxed opacity-100 drop-shadow-md">
                                                    {item.text}
                                                </span>
                                            </div>
                                            <button onClick={() => toggleBanner(idx)} className="absolute top-4 right-4 text-white/50 hover:text-white transition-colors p-1">
                                                <Icon name="X" className="w-6 h-6" />
                                            </button>
                                            <div className="absolute right-[-12px] top-10 w-6 h-6 bg-indigo-700 rotate-45 border-r border-t border-indigo-400/50"></div>
                                        </div>
                                    )}
                                    
                                    <button
                                        onClick={() => toggleBanner(idx)}
                                        className={`flex items-center gap-3 px-6 py-4 rounded-2xl font-black text-[13px] transition-all shadow-xl active:scale-90 border whitespace-nowrap ${
                                            visibleBanners[idx] 
                                                ? 'bg-indigo-600 text-white border-indigo-400 ring-4 ring-indigo-500/20' 
                                                : 'bg-white text-gray-900 border-gray-100 hover:bg-gray-50'
                                        }`}
                                    >
                                        <Icon name="FileText" className="w-4 h-4" />
                                        {item.label}
                                    </button>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
