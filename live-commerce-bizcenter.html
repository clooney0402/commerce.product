<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>라이브 커머스 - 비즈센터</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #F5F7FA;
        }
        ::-webkit-scrollbar { 
            width: 8px; 
            height: 8px; 
        }
        ::-webkit-scrollbar-track { 
            background: #f1f1f1; 
            border-radius: 10px; 
        }
        ::-webkit-scrollbar-thumb { 
            background: #ccc; 
            border-radius: 10px; 
        }
        ::-webkit-scrollbar-thumb:hover { 
            background: #bbb; 
        }
        .animate-in { 
            animation: animateIn 0.3s ease-out forwards; 
        }
        @keyframes animateIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        // Lucide 아이콘 맵
        const iconMap = {
            Heart: () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>,
            Gift: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v-1m0 0H8m4 0h4m-4 0v8m0-8l-4 4m8 0l4 4M5 12a7 7 0 1014 0 7 7 0 01-14 0z" /></svg>,
            Ticket: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M7 4v16m10-16v16M5 8h14m-7 4h7m-7 4h7" /></svg>,
            Share2: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 16v-4m8 4v-4m-6 4h4m0 0H6m6 0h6" /></svg>,
            X: () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>,
            ChevronRight: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>,
            Plus: () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 5v14m7-7H5" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>,
            Minus: () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M5 12h14" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>,
            Check: () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>,
            AlertCircle: () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>,
            Store: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" /></svg>,
            Info: () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>,
            Share: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8.684 13.342C8.886 12.938 9 12.469 9 12c0-1.657-.895-3.095-2.236-3.88L5.07 6.323a7.972 7.972 0 011.5-.866m9.286 0c.72.398 1.378.89 1.95 1.467l-2.694 2.797A4.956 4.956 0 0115 12c0 .469.114.938.316 1.342m2.82 6.674A7.972 7.972 0 1012 2c3.879 0 7.26 2.014 9.372 5.03" /></svg>,
            RotateCcw: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>,
            Download: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>,
            ChevronDown: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 14l-7 7m0 0l-7-7m7 7V3" /></svg>,
            Filter: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" /></svg>,
            Search: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>,
            Trash2: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>,
            HelpCircle: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
            CheckCircle2: () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M10 15.172l9.192-9.193 1.415 1.414L10 18l-6.364-6.364 1.414-1.414z" /><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" strokeWidth="2"/></svg>,
        };

        const Icon = ({ name, ...props }) => {
            const Component = iconMap[name];
            return Component ? <Component {...props} /> : null;
        };

        // MobileFrame 컴포넌트
        const MobileFrame = ({ title, children, onShare, overlayBanner }) => (
            <div className="flex flex-col items-center gap-4 flex-shrink-0">
                <div className="flex items-center justify-between w-full max-w-[380px] px-2">
                    <h2 className="text-white font-bold text-xs bg-gray-800 px-4 py-1 rounded-full tracking-tight">{title}</h2>
                    <button onClick={onShare} className="flex items-center gap-1 bg-indigo-600 hover:bg-indigo-500 text-white text-[10px] px-3 py-1.5 rounded-full font-bold transition-all shadow-lg active:scale-95">
                        <Icon name="Share" className="w-3 h-3" /> 공유
                    </button>
                </div>
                <div className="relative w-[380px] h-[760px] bg-black overflow-hidden shadow-2xl rounded-[3.5rem] border-[10px] border-gray-900 flex-shrink-0 transition-all duration-300">
                    {children}
                    {overlayBanner && (
                        <div className="absolute inset-0 z-[300] flex items-center justify-center p-6 animate-in fade-in zoom-in duration-300">
                            <div className="absolute inset-0 bg-black/50 backdrop-blur-sm" />
                            <div className="relative bg-white rounded-2xl p-8 shadow-2xl border border-gray-100 w-full max-w-[300px]">
                                <p className="text-[15px] font-bold text-gray-900 leading-relaxed whitespace-pre-wrap">{String(overlayBanner)}</p>
                                <button 
                                    className="mt-6 w-full bg-[#f05090] text-white py-2.5 rounded-xl text-xs font-black active:scale-95 transition-transform shadow-md" 
                                    onClick={() => window.dispatchEvent(new CustomEvent('closeManual'))}
                                >
                                    확인
                                </button>
                            </div>
                        </div>
                    )}
                    <div className="absolute bottom-2 left-1/2 -translate-x-1/2 w-24 h-1.5 bg-white/30 rounded-full z-[200]" />
                </div>
            </div>
        );

        // App 메인 컴포넌트
        const App = () => {
            const [user, setUser] = useState(true);
            const [roomId, setRoomId] = useState('demo-room');
            const [inventory, setInventory] = useState([
                { id: 1001, name: "합배송상품", fullName: "합배송 상품 (기본 배송비)", option: "기본 배송비 결제", code: "qe7r1g78", price: 1500, livePrice: 1500, img: "https://images.unsplash.com/photo-1594223274512-ad4803739b7c?q=80&w=400&auto=format&fit=crop", stats: { total: 1000, reserved: 0, ordered: 0, expected: 1000, real: 1000 }, period: "2025.11.01 16:00 - 23:59" },
                { id: 1002, name: "테스트1", fullName: "테스트 상품 01", option: "옵션 선택 없음", code: "5wwjp967", price: 1000, livePrice: 1000, img: "https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?q=80&w=400&auto=format&fit=crop", stats: { total: 1000, reserved: 0, ordered: 0, expected: 1000, real: 1000 }, period: "2025.11.01 16:00 - 23:59" },
                { id: 1003, name: "배송비상품", fullName: "기본 배송비 상품", option: "단일 옵션", code: "5j6kj96e", price: 4000, livePrice: 4000, img: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?q=80&w=400&auto=format&fit=crop", stats: { total: 99999, reserved: 0, ordered: 0, expected: 99999, real: 99999 }, period: "2025.11.01 16:00 - 23:59" }
            ]);
            const [upProductId, setUpProductId] = useState(null);
            const [storeStatus, setStoreStatus] = useState({});
            const [productStatuses, setProductStatuses] = useState({});
            const [orderedItems, setOrderedItems] = useState([]);
            const [selectedIds, setSelectedIds] = useState([]);
            const [isStoreOpen, setIsStoreOpen] = useState(false);
            const [storeActiveTab, setStoreActiveTab] = useState('판매상품');
            const [isOptionOpen, setIsOptionOpen] = useState(false);
            const [selectingProduct, setSelectingProduct] = useState(null);
            const [selectQuantity, setSelectQuantity] = useState(1);
            const [showOrderToast, setShowOrderToast] = useState(false);
            const [alertMsg, setAlertMsg] = useState(null);
            const [bizAlert, setBizAlert] = useState(null);
            const [activeManualBanner, setActiveManualBanner] = useState(null);
            const [editingCell, setEditingCell] = useState(null);
            const [editValue, setEditValue] = useState("");
            const [searchTerm, setSearchTerm] = useState("");
            const [quickRegName, setQuickRegName] = useState("");
            const [quickRegPrice, setQuickRegPrice] = useState("");
            const [quickRegQty, setQuickRegQty] = useState("");

            const manualItems = [
                { title: "화면 설명", banner: "한정판매 비즈센터 방송상품 설정과 라이브 시청자 샘플 화면입니다." },
                { title: "한정판매 상품 UP", banner: "UP 버튼을 통해 선착순 판매상품을 노출하세요.\n\n판매예정인 경우 가격 없이 '판매예정' 상태로 고객에게 안내됩니다." },
                { title: "스토어 노출하기", banner: "스토어 ON 버튼 클릭 시\n상품 리스트에 해당 상품이 노출됩니다." },
                { title: "판매가능 재고 확인", banner: "주문 버튼을 통해 점유된 재고는 '점유수량'에 카운트되며,\n실시간으로 '판매가능수량'에서 차감됩니다." },
                { title: "플래시 등록 가이드", banner: "플래시 상품 간편 등록을 통해\n방송 중인 상품을 즉시 리스트에 추가하고 판매할 수 있습니다." },
                { title: "상품 검색하기", banner: "상품명은 텍스트 입력 즉시 검색됩니다. 상품코드는 전체 코드를 입력하여주세요." }
            ];

            const showBizAlert = useCallback((msg) => {
                setBizAlert(msg);
                setTimeout(() => setBizAlert(null), 3500);
            }, []);

            const openOrderPopup = useCallback((product) => {
                setSelectingProduct(product);
                setSelectQuantity(1);
                setIsOptionOpen(true);
            }, []);

            const handleAddToCart = useCallback(() => {
                if (!selectingProduct) return;
                const qty = selectQuantity;
                const nextInventory = inventory.map(p => {
                    if (p.id === selectingProduct.id) {
                        const currentTotal = p.stats.total || 0;
                        const currentReserved = p.stats.reserved || 0;
                        return {
                            ...p,
                            stats: {
                                ...p.stats,
                                total: Math.max(0, currentTotal - qty),
                                reserved: currentReserved + qty,
                                real: Math.max(0, currentTotal - qty)
                            }
                        };
                    }
                    return p;
                });
                setOrderedItems(prev => {
                    const existingIdx = prev.findIndex(item => item.id === selectingProduct.id);
                    if (existingIdx > -1) {
                        const newItems = [...prev];
                        newItems[existingIdx].quantity += qty;
                        return newItems;
                    }
                    return [...prev, { ...selectingProduct, quantity: qty, orderId: Date.now() }];
                });
                setInventory(nextInventory);
                setIsOptionOpen(false);
                setShowOrderToast(true);
                setTimeout(() => setShowOrderToast(false), 3000);
            }, [selectingProduct, selectQuantity, inventory]);

            const toggleUp = (id) => {
                if (storeStatus[id]) {
                    showBizAlert("스토어 노출 중인 상품은 한정판매 UP 설정이 불가능합니다.");
                    return;
                }
                const nextUp = upProductId === id ? null : id;
                setUpProductId(nextUp);
            };

            const changeStatus = (id, newStatus) => {
                const nextStatuses = { ...productStatuses, [id]: newStatus };
                setProductStatuses(nextStatuses);
            };

            const toggleExposure = (id) => {
                if (id === upProductId) {
                    showBizAlert("한정판매 UP 상품은 스토어 노출 설정이 불가능합니다.");
                    return;
                }
                const nextEx = { ...storeStatus, [id]: !storeStatus[id] };
                setStoreStatus(nextEx);
            };

            const handleQuickRegister = () => {
                const newId = Date.now();
                const newProduct = {
                    id: newId,
                    name: quickRegName,
                    fullName: quickRegName,
                    option: "단일 옵션",
                    code: "REG-" + Math.random().toString(36).substring(2, 6).toUpperCase(),
                    price: parseInt(quickRegPrice.replace(/,/g, "")) || 0,
                    livePrice: parseInt(quickRegPrice.replace(/,/g, "")) || 0,
                    img: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=400&auto=format&fit=crop",
                    stats: { total: parseInt(quickRegQty) || 0, reserved: 0, ordered: 0, expected: parseInt(quickRegQty) || 0, real: parseInt(quickRegQty) || 0 },
                    period: "2026.02.04 16:00 - 23:59"
                };
                const nextInventory = [...inventory, newProduct];
                const nextStoreStatus = { ...storeStatus, [newId]: false };
                const nextProductStatuses = { ...productStatuses, [newId]: '판매예정' };
                setInventory(nextInventory);
                setStoreStatus(nextStoreStatus);
                setProductStatuses(nextProductStatuses);
                showBizAlert("새 상품이 '판매예정' 상태로 등록되었습니다.");
                setQuickRegName("");
                setQuickRegPrice("");
                setQuickRegQty("");
            };

            const handleDeleteSelected = () => {
                if (selectedIds.length === 0) return;
                if (selectedIds.includes(upProductId)) {
                    showBizAlert("한정판매 UP 중인 상품은 삭제할 수 없습니다.");
                    return;
                }
                const nextInventory = inventory.filter(p => !selectedIds.includes(p.id));
                setInventory(nextInventory);
                setSelectedIds([]);
                showBizAlert("선택한 상품이 목록에서 삭제되었습니다.");
            };

            const handleBatchStoreExposure = () => {
                const nextStoreStatus = { ...storeStatus };
                inventory.forEach(p => {
                    if (p.id !== upProductId) {
                        nextStoreStatus[p.id] = true;
                    }
                });
                setStoreStatus(nextStoreStatus);
                showBizAlert("한정판매 UP 상품을 제외한 모든 상품이 스토어에 일괄 노출되었습니다.");
            };

            const toggleSelect = (id) => setSelectedIds(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]);
            const toggleSelectAll = () => {
                if (selectedIds.length === sortedInventory.length) setSelectedIds([]);
                else setSelectedIds(sortedInventory.map(p => p.id));
            };

            const handleShare = useCallback(() => {
                const shareUrl = `${window.location.href}`;
                const textArea = document.createElement("textarea");
                textArea.value = shareUrl;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                setAlertMsg("공유 링크가 클립보드에 복사되었습니다.");
                setTimeout(() => setAlertMsg(null), 3000);
            }, []);

            const filteredInventory = useMemo(() => {
                return inventory.filter(p => p.name.toLowerCase().includes(searchTerm.toLowerCase()));
            }, [inventory, searchTerm]);

            const sortedInventory = useMemo(() => {
                return [...filteredInventory].sort((a, b) => {
                    if (a.id === upProductId) return -1;
                    if (b.id === upProductId) return 1;
                    return b.id - a.id;
                });
            }, [filteredInventory, upProductId]);

            const currentUpProduct = useMemo(() =>
                upProductId ? inventory.find(p => p.id === upProductId) : null,
            [inventory, upProductId]);

            const upStatus = useMemo(() =>
                upProductId ? (productStatuses[upProductId] || '판매예정') : null,
            [upProductId, productStatuses]);

            const exposedProducts = useMemo(() =>
                inventory.filter(p => storeStatus[p.id]),
            [inventory, storeStatus]);

            const isQuickRegValid = quickRegName && quickRegPrice && quickRegQty;

            useEffect(() => {
                const handleCloseManual = () => setActiveManualBanner(null);
                window.addEventListener('closeManual', handleCloseManual);
                return () => window.removeEventListener('closeManual', handleCloseManual);
            }, []);

            return (
                <div className="min-h-screen bg-[#F5F7FA] p-8 flex flex-col items-center gap-12 font-sans overflow-y-auto">
                    {alertMsg && (
                        <div className="fixed top-12 left-1/2 -translate-x-1/2 z-[1000] bg-gray-900/95 backdrop-blur-md text-white px-8 py-4 rounded-2xl shadow-2xl border border-white/10 flex items-center gap-4 animate-in">
                            <Icon name="CheckCircle2" className="text-emerald-400 w-6 h-6" />
                            <span className="text-sm font-bold">{String(alertMsg)}</span>
                        </div>
                    )}

                    {/* 상단 섹션: 미리보기 & 메뉴얼 */}
                    <div className="flex flex-row items-start justify-center gap-16 w-full max-w-[1500px]">
                        <MobileFrame title="고객 뷰 실시간 미리보기" onShare={handleShare} overlayBanner={activeManualBanner}>
                            <div className="relative h-full w-full overflow-hidden bg-black">
                                <img src="https://images.unsplash.com/photo-1525507119028-ed4c629a60a3?q=80&w=1000&auto=format&fit=crop" className="absolute inset-0 w-full h-full object-cover opacity-90" alt="live" />
                                <div className="absolute inset-0 bg-gradient-to-b from-black/40 via-transparent to-black/90" />
                                <div className="relative z-20 flex items-center justify-between p-6 pt-10 text-white">
                                    <div className="flex items-center gap-3 bg-black/20 backdrop-blur-md rounded-full pl-1.5 pr-4 py-1.5 border border-white/10">
                                        <div className="w-9 h-9 rounded-full bg-pink-500 overflow-hidden border border-white/30">
                                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Lucky" alt="avatar" />
                                        </div>
                                        <div>
                                            <div className="text-[11px] font-bold">쓰리백초특가 💎</div>
                                            <div className="text-[9px] opacity-80">❤️ 5만 👁️ 723</div>
                                        </div>
                                    </div>
                                    <div className="flex gap-4 text-white">
                                        <Icon name="Share2" className="w-5 h-5" />

                                                    <th className="w-28 text-right pr-6 text-[#f05090]">점유수량</th>
                                                    <th className="w-28 text-right pr-6 text-indigo-600">실주문수량</th>
                                                    <th className="w-32 text-right pr-6">판매가능수량</th>
                                                    <th className="w-40 text-center">판매기간</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-gray-100">
                                                {sortedInventory.map((p) => {
                                                    const isUp = upProductId === p.id;
                                                    const status = productStatuses[p.id] || '판매예정';
                                                    return (
                                                        <tr key={p.id} className={`h-20 transition-colors ${isUp ? 'bg-[#FFFDE7]' : 'hover:bg-gray-50/50'}`}>
                                                            <td className="text-center px-4"><input type="checkbox" checked={selectedIds.includes(p.id)} onChange={() => toggleSelect(p.id)} className="accent-[#f05090] w-4 h-4 rounded" /></td>
                                                            <td className="text-center"><div className="flex justify-center p-2"><div className="relative w-14 h-14 rounded-lg overflow-hidden border border-gray-100 shadow-sm bg-gray-50"><img src={p.img} className="w-full h-full object-cover" alt="t" /></div></div></td>
                                                            <td className="font-black text-gray-900 pl-6 truncate" title={p.name}>{p.name}</td>
                                                            <td className="text-gray-400 font-bold text-[11px] uppercase tracking-tighter text-center">{p.code}</td>
                                                            <td className="text-center"><button onClick={() => toggleUp(p.id)} className={`px-4 py-1.5 rounded-lg text-[11px] font-black border transition-all shadow-sm ${isUp ? 'bg-[#f05090] text-white' : 'bg-gray-200 text-gray-500'}`}>UP</button></td>
                                                            <td className="text-center"><div className="flex gap-1 justify-center bg-gray-50 p-1 rounded-xl border border-gray-100 w-fit mx-auto shadow-inner">{['판매예정', '판매시작', '품절'].map(st => (<button key={st} onClick={() => changeStatus(p.id, st)} className={`px-4 py-1.5 rounded-lg text-[10px] transition-all font-black ${status === st ? 'bg-white text-[#f05090] shadow-sm border border-pink-100' : 'text-gray-300 hover:text-gray-500'}`}>{st}</button>))}</div></td>
                                                            <td className="text-center"><div className={`w-11 h-6 rounded-full relative mx-auto cursor-pointer transition-all duration-300 shadow-inner ${storeStatus[p.id] ? 'bg-emerald-400' : 'bg-gray-200'}`} onClick={() => toggleExposure(p.id)}><div className={`absolute top-1 w-4 h-4 bg-white rounded-full shadow-md transition-all ${storeStatus[p.id] ? 'right-1' : 'left-1'}`} /></div></td>
                                                            <td className="font-bold text-gray-400 text-center">판매중</td>
                                                            <td className="text-right pr-6 font-bold text-gray-400">{p.price.toLocaleString()}</td>
                                                            <td className="text-right pr-6 font-bold text-gray-400">{p.price.toLocaleString()}</td>
                                                            <td className="text-right pr-6"><span className="font-black text-[#f05090] text-[14px] underline cursor-pointer hover:bg-pink-50 transition-colors">{p.livePrice.toLocaleString()}</span></td>
                                                            <td className="text-right pr-6"><span className="font-bold text-gray-700 underline cursor-pointer hover:bg-gray-100 transition-colors">{p.stats.total.toLocaleString()}</span></td>
                                                            <td className="text-right pr-6 font-black text-[#f05090]">{p.stats.reserved.toLocaleString()}</td>
                                                            <td className="text-right pr-6 font-black text-indigo-600">0</td>
                                                            <td className="text-right pr-6 font-bold text-gray-900">{p.stats.real.toLocaleString()}</td>
                                                            <td className="text-gray-400 text-[10px] font-bold text-center">{p.period.split(' - ')[1]}</td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </section>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
