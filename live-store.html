function OptionPopup({isOpen,onClose,product,onAddToCart,onDirectBuy}){
  const[d1,setD1]=useState('');const[d2,setD2]=useState('');const[d3,setD3]=useState('');
  const[qty,setQty]=useState(1);const[selRows,setSelRows]=useState([]);
  useEffect(()=>{if(isOpen){setD1('');setD2('');setD3('');setQty(1);setSelRows([]);}}, [isOpen]);
  if(!isOpen||!product)return null;
  const{optionType,options}=product;
  const base=parsePrice(product.price);
  const hD1=v=>{setD1(v);setD2('');setD3('');if(optionType==='depth1'){if(!selRows.find(r=>r.label===v))setSelRows(p=>[...p,{label:v,qty:1}]);setD1('');}};
  const hD2=v=>{setD2(v);setD3('');if(optionType==='depth2'){const lbl=`${d1}, ${v}`;if(!selRows.find(r=>r.label===lbl))setSelRows(p=>[...p,{label:lbl,qty:1}]);setD1('');setD2('');}};
  const hD3=v=>{setD3(v);if(optionType==='depth3'){const lbl=`${d1}, ${d2}, ${v}`;if(!selRows.find(r=>r.label===lbl))setSelRows(p=>[...p,{label:lbl,qty:1}]);setD1('');setD2('');setD3('');}};
  const chQty=(i,d)=>setSelRows(p=>p.map((r,j)=>j===i?{...r,qty:Math.max(1,r.qty+d)}:r));
  const rmRow=i=>setSelRows(p=>p.filter((_,j)=>j!==i));
  const total=optionType==='none'?base*qty:selRows.reduce((s,r)=>s+base*r.qty,0);
  const canBuy=optionType==='none'?true:selRows.length>0;
  const totalQty=()=>optionType==='none'?qty:selRows.reduce((s,r)=>s+r.qty,0);
  const btnStyle=ok=>({flex:1,padding:'13px 0',background:ok?'#0f172a':'#e2e8f0',color:ok?'white':'#94a3b8',fontWeight:900,borderRadius:14,fontSize:13,border:'none',cursor:ok?'pointer':'not-allowed'});
  return h('div',{style:{position:'absolute',inset:0,zIndex:50,display:'flex',alignItems:'flex-end'}},
    h('div',{style:{position:'absolute',inset:0,background:'rgba(0,0,0,0.5)'},onClick:onClose}),

function App(){
  const[phase,setPhase]=useState('setup');
  const[products]=useState(PRODUCTS);
  const[upProduct,setUpProduct]=useState(null);
  const[cartItems,setCartItems]=useState([]);
  const[cartQty,setCartQty]=useState({});
  const toggleUp=p=>setUpProduct(prev=>prev&&prev.id===p.id?null:p);
  const addToCart=(product,qty)=>{
    setCartItems(prev=>prev.find(i=>i.id===product.id)?prev:[...prev,product]);
    setCartQty(prev=>({...prev,[product.id]:(prev[product.id]||0)+qty}));
  };
  const changeQty=(id,delta)=>setCartQty(prev=>({...prev,[id]:Math.max(1,(prev[id]||1)+delta)}));
  const removeCart=id=>{setCartItems(prev=>prev.filter(i=>i.id!==id));setCartQty(prev=>{const n={...prev};delete n[id];return n;});};
  const hints=phase==='setup'
    ?[{icon:'①',text:'셀러: 판매상품 클릭 → 상품 선택 팝업',color:'#0f172a'}]
    :[{icon:'①',text:'셀러: 쇼핑백 → NOW 버튼으로 상품 강조',color:'#0f172a'}];
  hints.push({icon:'②',text:'고객: 상품보기 → 구매 → 바로구매 클릭',color:'#6366f1'});
  hints.push({icon:'③',text:'결제 풀페이지: X버튼으로 닫기',color:'#f43f5e'});
  return h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'linear-gradient(135deg,#e2e8f0 0%,#cbd5e1 100%)',padding:'24px 16px',gap:20}},
    h('div',{style:{textAlign:'center'}},
      h('h1',{style:{fontSize:18,fontWeight:900,color:'#0f172a',letterSpacing:'-0.5px'}},'🎬 스토어 라이브 프로토타입'),
      h('p',{style:{fontSize:12,color:'#64748b',fontWeight:600,marginTop:4}},'셀러와 고객 화면을 동시에 확인하세요')
    ),
    h('div',{style:{display:'flex',gap:24,alignItems:'flex-start',flexWrap:'wrap',justifyContent:'center'}},
      h(PhoneMockup,{label:'🛍️ 고객 뷰',labelColor:'#f43f5e'},
        h(CustomerLiveView,{isLive:phase==='live',upProduct,products,cartItems,cartQty,onAddToCart:addToCart,onQtyChange:changeQty,onCartRemove:removeCart})
      ),
      h(PhoneMockup,{label:'📹 셀러 뷰',labelColor:'#0f172a'},
        phase==='setup'
          ?h(SellerSetupView,{onStart:()=>setPhase('live'),products})
          :h(SellerLiveView,{upProduct,onToggleUp:toggleUp,products})
      )
    ),
    h('div',{style:{display:'flex',gap:10,flexWrap:'wrap',justifyContent:'center'}},
      hints.map(({icon,text,color})=>h('div',{key:icon,style:{background:'white',borderRadius:12,padding:'8px 14px',display:'flex',alignItems:'center',gap:8,boxShadow:'0 2px 8px rgba(0,0,0,0.08)'}},
        h('span',{style:{width:22,height:22,borderRadius:9999,background:color,color:'white',fontSize:10,fontWeight:900,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}},icon),
        h('span',{style:{fontSize:11,fontWeight:700,color:'#475569'}},text)
      ))
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
